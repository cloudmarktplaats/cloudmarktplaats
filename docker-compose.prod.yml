# Docker's json-file driver has no size limit by default. nginx's access log
# went to stdout and sat here unrotated for 11 days — 2.9MB of real IPs, while
# we publish that IPs are stripped within 24h. Access logging now goes to a file
# without IPs (docker/nginx/default.conf); this cap is the backstop for
# error_log and for every other container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["8080:80"]
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [php-fpm]
    logging: *default-logging

  php-fpm:
    build: ./docker/php-fpm
    restart: unless-stopped
    volumes: ["./:/app"]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    logging: *default-logging

  queue-worker:
    build: ./docker/php-fpm
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --backoff=30 --max-time=3600
    volumes: ["./:/app"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    logging: *default-logging

  scheduler:
    build: ./docker/php-fpm
    restart: unless-stopped
    command: php artisan schedule:work
    volumes: ["./:/app"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
