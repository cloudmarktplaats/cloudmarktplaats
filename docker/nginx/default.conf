# Access logging without an IP.
#
# nginx's `combined` default logs the client's remote address — and behind our
# Caddy proxy that resolves to the visitor's real IP via X-Forwarded-For. Those lines went
# to stdout, i.e. docker's json-file driver, which had no max-size: 11 days of
# real IPs sat on the box while we publish that IPs are stripped within 24h
# (IpStripperJob does that, but only in the database).
#
# Dropping the IP means there is no personal data here at all, so nothing to
# retain and nothing to strip. What stays is what we actually want to know:
# when, what was requested (the querystring carries our utm_* params), the
# status, where the visitor came from, and enough UA to spot bots.
#
# escape=json (nginx >= 1.11.8; prod runs 1.27.5) makes every line valid JSON,
# so a quote in a user agent cannot break the parser. See TrafficReport.
#
# log_format is only valid in the http context, hence it lives here, above
# the server block, rather than next to the access_log directive below.
log_format cmp_privacy escape=json
    '{"t":"$time_iso8601","m":"$request_method","u":"$request_uri",'
    '"s":$status,"ref":"$http_referer","ua":"$http_user_agent"}';

server {
    listen 80 default_server;
    server_name _;
    root /app/public;
    index index.php;

    # The wizard validates photos at max:8192 (8MB) and accepts 10 per submit,
    # so a full batch is ~80MB. This must stay >= PHP's post_max_size (88M, set
    # in docker/php-fpm/Dockerfile) — three layers gate an upload (nginx ->
    # PHP -> Laravel) and the strictest silently wins.
    #
    # History: this was 1m (nginx default) and gave a 413; raising it to 10m
    # fixed that but left PHP's upload_max_filesize at its 2M default, so every
    # phone photo still died with "photos.0 failed to upload" — the next layer
    # down. Fixing one layer is not fixing the upload.
    client_max_body_size 88m;

    # A file, not stdout: the app has to read this back (php artisan traffic:report),
    # and docker logs are not reachable from PHP. Deliberately NOT in storage/logs/ —
    # that is www-data's laravel.log and nginx' master runs as root; mixed owners in
    # one directory is what broke web logging on 2026-07-03.
    access_log /app/storage/nginx/access.log cmp_privacy;

    # Compress text assets. Cuts ~400 KiB off a cold page load (CSS, the
    # Livewire/Alpine runtime, JSON, SVG) and is the single biggest
    # transfer-size win for both dev and prod.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Fingerprinted build assets and self-hosted fonts are immutable —
    # cache them hard so repeat views don't refetch.
    location ~* ^/(build|fonts)/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
