# Access logging without an IP.
#
# nginx's `combined` default logs the client's remote address — and behind our
# Caddy proxy that resolves to the visitor's real IP via X-Forwarded-For. Those lines went
# to stdout, i.e. docker's json-file driver, which had no max-size: 11 days of
# real IPs sat on the box while we publish that IPs are stripped within 24h
# (IpStripperJob does that, but only in the database).
#
# Dropping the IP means there is no personal data here at all, so nothing to
# retain and nothing to strip. What stays is what we actually want to know:
# when, what was requested (the querystring carries our utm_* params), the
# status, where the visitor came from, and enough UA to spot bots.
#
# escape=json (nginx >= 1.11.8; prod runs 1.27.5) makes every line valid JSON,
# so a quote in a user agent cannot break the parser. See TrafficReport.
#
# log_format is only valid in the http context, hence it lives here, above
# the server block, rather than next to the access_log directive below.
# What we log is an allowlist, not a filter.
#
# $request_uri carries the full URL including the query string, and that is not
# a hypothetical problem: Laravel's reset link is /reset-password/{token}?email=…
# (see App\Livewire\Auth\ResetPassword), so logging it verbatim writes a live
# credential and an email address into a 644 file we keep for a week. Same for
# /register?invite=CODE. And $http_referer leaks the same URL from any page a
# visitor navigates away from — filtering those lines at report time is no help,
# the line is already written.
#
# So: strip the query, redact credential-bearing paths, and pull out only the
# three utm_* params we actually asked for. Anything new that ends up in a URL
# cannot leak by default — which is the whole point of an allowlist.

# 1. Path without the query string. Note $uri is NOT usable here: try_files
#    rewrites it to /index.php for every page.
map $request_uri $cmp_uri_path {
    ~^(?<p>[^?]*)  $p;
    default        "/";
}

# 2. Redact paths whose path segment IS a credential (first match wins).
map $cmp_uri_path $cmp_path {
    ~^/reset-password/  "/reset-password/[redacted]";
    ~^/email/verify/    "/email/verify/[redacted]";
    default             $cmp_uri_path;
}

# 3. Referer reduced to its origin: we want to know it was LinkedIn, not which
#    post — and never the query of the page someone came from.
map $http_referer $cmp_ref {
    ""                                 "";
    ~^(?<o>[a-z][a-z0-9+.-]*://[^/]+)  $o;
    default                            "overig";
}

log_format cmp_privacy escape=json
    '{"t":"$time_iso8601","m":"$request_method","u":"$cmp_path",'
    '"s":$status,"ref":"$cmp_ref",'
    '"us":"$arg_utm_source","um":"$arg_utm_medium","uc":"$arg_utm_campaign",'
    '"ua":"$http_user_agent"}';

server {
    listen 80 default_server;
    server_name _;
    root /app/public;
    index index.php;

    # The wizard validates photos at max:8192 (8MB) and accepts 10 per submit,
    # so a full batch is ~80MB. This must stay >= PHP's post_max_size (88M, set
    # in docker/php-fpm/Dockerfile) — three layers gate an upload (nginx ->
    # PHP -> Laravel) and the strictest silently wins.
    #
    # History: this was 1m (nginx default) and gave a 413; raising it to 10m
    # fixed that but left PHP's upload_max_filesize at its 2M default, so every
    # phone photo still died with "photos.0 failed to upload" — the next layer
    # down. Fixing one layer is not fixing the upload.
    client_max_body_size 88m;

    # A file, not stdout: the app has to read this back (php artisan traffic:report),
    # and docker logs are not reachable from PHP. Deliberately NOT in storage/logs/ —
    # that is www-data's laravel.log and nginx' master runs as root; mixed owners in
    # one directory is what broke web logging on 2026-07-03.
    access_log /app/storage/nginx/access.log cmp_privacy;

    # Compress text assets. Cuts ~400 KiB off a cold page load (CSS, the
    # Livewire/Alpine runtime, JSON, SVG) and is the single biggest
    # transfer-size win for both dev and prod.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # nginx' mime.types kent de .webmanifest-extensie niet en serveert 'm
    # anders als application/octet-stream. Een PWA-manifest hoort
    # application/manifest+json te zijn — zonder dit faalt het stil (browsers
    # zijn tolerant, maar het is precies de kapotte-verwijzing die we voorkomen).
    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Fingerprinted build assets and self-hosted fonts are immutable —
    # cache them hard so repeat views don't refetch.
    location ~* ^/(build|fonts)/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
