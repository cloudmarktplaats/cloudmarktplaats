server {
    listen 80 default_server;
    server_name _;
    root /app/public;
    index index.php;

    # App validates listing/homelab photo uploads up to 8192KB; nginx's
    # 1m default was rejecting them with a 413 before the request ever
    # reached PHP. 10m gives headroom above the app-level limit.
    client_max_body_size 10m;

    # Compress text assets. Cuts ~400 KiB off a cold page load (CSS, the
    # Livewire/Alpine runtime, JSON, SVG) and is the single biggest
    # transfer-size win for both dev and prod.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Fingerprinted build assets and self-hosted fonts are immutable —
    # cache them hard so repeat views don't refetch.
    location ~* ^/(build|fonts)/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
