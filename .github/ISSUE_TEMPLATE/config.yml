# Blank issues stay enabled: a rigid form should never be the reason someone
# gives up on reporting. Every serious bug so far arrived as a plain message,
# not a filled-in form.
blank_issues_enabled: true

contact_links:
  - name: Vraag over de site (geen bug)
    url: https://cloudmarktplaats.nl/faq
    about: Hoe iets werkt, privacy, founding members — waarschijnlijk staat het in de FAQ.
  - name: Beveiligingsprobleem
    url: https://github.com/cloudmarktplaats/cloudmarktplaats/blob/main/SECURITY.md
    about: Meld dit NIET als openbaar issue. Zie SECURITY.md — mail privacy@cloudmarktplaats.nl, dan lossen we het eerst op.
  - name: Meehelpen bouwen
    url: https://github.com/cloudmarktplaats/cloudmarktplaats/blob/main/CONTRIBUTING.md
    about: Code, tests of meedenken? Zo werkt bijdragen — inclusief de eerste PR.
