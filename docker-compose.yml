# Docker's json-file driver has no size limit by default. nginx's access log
# went to stdout and sat here unrotated for 11 days — 2.9MB of real IPs, while
# we publish that IPs are stripped within 24h. Access logging now goes to a file
# without IPs (docker/nginx/default.conf); this cap is the backstop for
# error_log and for every other container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [php-fpm]
    logging: *default-logging

  php-fpm:
    build: ./docker/php-fpm
    volumes: ["./:/app"]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: mailpit
    depends_on: [postgres, redis, mailpit]
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cloudmarktplaats
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    logging: *default-logging

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    logging: *default-logging

  mailpit:
    image: axllent/mailpit:latest
    ports: ["8025:8025", "1025:1025"]
    logging: *default-logging

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    logging: *default-logging

  queue-worker:
    build: ./docker/php-fpm
    command: php artisan queue:work --tries=3 --backoff=30 --max-time=3600
    volumes: ["./:/app"]
    depends_on: [postgres, redis]
    restart: unless-stopped
    logging: *default-logging

  scheduler:
    build: ./docker/php-fpm
    command: php artisan schedule:work
    volumes: ["./:/app"]
    depends_on: [postgres, redis]
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  miniodata:
